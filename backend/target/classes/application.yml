server:
  port: 8080

spring:
  application:
    name: ktv-ai-assistant
  
  datasource:
    url: jdbc:h2:mem:ktv_ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat
  temperature: 0.7

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /doc.html

logging:
  level:
    com.ktvai.assistant: DEBUG
